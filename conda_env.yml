name: carla_ekf_cpu
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.7
  - setuptools=65.5.0
  - wheel=0.38.4
  - numpy=1.21.6
  - scipy=1.7.3
  - pandas=1.3.5
  - scikit-learn=1.0.2
  - matplotlib=3.5.3
  - seaborn=0.12.2
  - tqdm=4.64.1
  - pyyaml=6.0
  - joblib=1.1.0
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==1.13.1+cpu
      - torchvision==0.14.1+cpu
